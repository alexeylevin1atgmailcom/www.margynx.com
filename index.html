<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agentix Quantum Cockpit</title>
  <meta name="description" content="Ultimate Repricing and Analytics Tool for Amazon Sellers." />
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" href="logo512x512.png">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="site-bg"></div>

  <main class="stage-shell">
    <section class="stage">
      <header class="site-header">
        <div class="header-inner">
          <a class="brand" href="index.html" aria-label="Margynx home">
            <img src="logo.png" alt="Margynx logo" />
            <div class="brand-copy">
              <strong>Margynx</strong>
              <span>AGENTIX QUANTUM COCKPIT</span>
            </div>
          </a>

          <nav class="topnav">
            <a href="#cockpit">Cockpit</a>
            <a href="security.html">Security</a>
            <a href="privacy.html">Privacy</a>
            <a href="contact.html">Contact</a>
          </nav>
        </div>
      </header>

      <section class="hero-copy" aria-label="Hero">
        <h1>Agentix Quantum Cockpit</h1>
        <p>Ultimate Repricing and Analytics Tool for Amazon Sellers</p>
      </section>

      <section class="cockpit-grid" id="cockpit" aria-label="Cockpit">
        <button class="panel-card growth" data-panel="growth" aria-label="Open Growth Health">
          <img src="assets/growth-health.jpg" alt="Growth Health panel" />
          <span class="panel-pill">Click to expand</span>
        </button>

        <button class="panel-card buybox" data-panel="buybox" aria-label="Open Buy Box Position">
          <img src="assets/buy-box-position.jpg" alt="Buy Box Position panel" />
          <span class="panel-pill">Click to expand</span>
        </button>

        <button class="panel-card pricing" data-panel="pricing" aria-label="Open Pricing Control">
          <img src="assets/pricing-control.jpg" alt="Pricing Control panel" />
          <span class="panel-pill">Click to expand</span>
        </button>

        <button class="panel-card inventory" data-panel="inventory" aria-label="Open Inventory Risk">
          <img src="assets/inventory-risk.jpg" alt="Inventory Risk panel" />
          <span class="panel-pill">Click to expand</span>
        </button>

        <button class="panel-card ai" data-panel="ai" aria-label="Open AI Command Center">
          <img src="assets/ai-command-center.jpg" alt="AI Command Center panel" />
          <span class="panel-pill">Click to expand</span>
        </button>
      </section>
    </section>
  </main>

  <div class="modal" id="panelModal" hidden>
    <div class="modal-backdrop" data-close="true"></div>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" id="modalClose" aria-label="Close">×</button>

      <div class="modal-media">
        <img id="modalImage" src="" alt="" />
      </div>

      <aside class="modal-copy">
        <div class="eyebrow" id="modalEyebrow"></div>
        <h2 id="modalTitle"></h2>
        <p id="modalText"></p>
        <div class="signal-list" id="modalSignals"></div>
      </aside>
    </div>
  </div>

  <script>
    const PANEL_DATA = {
      growth: {
        eyebrow: 'Growth Health',
        title: 'Buy Box gains lifted revenue',
        text: 'Momentum is building. Competitive share improved, sessions remained supportive, and stronger conversion translated into topline lift.',
        image: 'assets/growth-health.jpg',
        signals: ['$13M revenue', '+12.4% growth', '2.1M sessions', '8.1% conversion']
      },
      buybox: {
        eyebrow: 'Buy Box Position',
        title: 'Win rate is improving',
        text: 'Buy Box control is strengthening. The current gains are still concentrated enough to preserve the playbook before scaling wider automation.',
        image: 'assets/buy-box-position.jpg',
        signals: ['80.1% win rate', '+7.1% lift', '92.9% weighted coverage', '$264.7K opportunity']
      },
      pricing: {
        eyebrow: 'Pricing Control',
        title: 'Profit capture is strong',
        text: 'Pricing remains aligned with the momentum wave. Margin capture holds while units and revenue both expand.',
        image: 'assets/pricing-control.jpg',
        signals: ['173.4K units', '+14.7% units', '$13M revenue', '52.1 price position']
      },
      inventory: {
        eyebrow: 'Inventory Risk',
        title: 'Availability is pressured but manageable',
        text: 'Illustrative inventory story for the concept: revenue at risk is material, weighted days of cover are tight, and excess inventory value exists in slower cohorts. The recommended move is to replenish priority SKUs while protecting exposed stock.',
        image: 'assets/inventory-risk.jpg',
        signals: ['$981.2K revenue at risk', '37 OOS listings', '5.9 weighted days of cover', '$746.5K excess inventory value']
      },
      ai: {
        eyebrow: 'AI Command Center',
        title: 'Persistent operating brain',
        text: 'The command center reads all four pillars together, interprets the dominant business story, and prepares concise executive actions.',
        image: 'assets/ai-command-center.jpg',
        signals: ['Observe', 'Interpret', 'Recommend', 'Human-in-the-loop control']
      }
    };

    const modal = document.getElementById('panelModal');
    const modalImage = document.getElementById('modalImage');
    const modalTitle = document.getElementById('modalTitle');
    const modalEyebrow = document.getElementById('modalEyebrow');
    const modalText = document.getElementById('modalText');
    const modalSignals = document.getElementById('modalSignals');
    const modalClose = document.getElementById('modalClose');

    function openPanel(key) {
      const panel = PANEL_DATA[key];
      if (!panel) return;
      modalEyebrow.textContent = panel.eyebrow;
      modalTitle.textContent = panel.title;
      modalText.textContent = panel.text;
      modalImage.src = panel.image;
      modalImage.alt = panel.eyebrow + ' concept panel';
      modalSignals.innerHTML = '';
      panel.signals.forEach((signal) => {
        const el = document.createElement('span');
        el.className = 'signal-pill';
        el.textContent = signal;
        modalSignals.appendChild(el);
      });
      modal.hidden = false;
      document.body.classList.add('modal-open');
    }

    function closeModal() {
      modal.hidden = true;
      document.body.classList.remove('modal-open');
    }

    document.querySelectorAll('.panel-card').forEach((card) => {
      card.addEventListener('click', () => openPanel(card.dataset.panel));
    });

    modal.addEventListener('click', (e) => {
      if (e.target.dataset.close === 'true') closeModal();
    });

    modalClose.addEventListener('click', closeModal);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !modal.hidden) closeModal();
    });
  </script>
</body>
</html>
